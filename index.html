<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <title>Magic Maid - Web MV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* MV 화면 컨테이너 - 16:9 비율 */
        .mv-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 9/16 = 0.5625 */
            max-height: 100vh;
            max-width: 177.78vh; /* 16/9 = 1.7778 */
            background: #D4A0A0;
            overflow: hidden;
            font-family: 'Noto Serif KR', serif;
        }

        #buttonOverlay {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            width: 100%;
            height: 100%;
            z-index: 2;

        }

        #playButton {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 25vh;
            height: 25vh;
            border-radius: 50%;
            font-size: 15vh;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            cursor: pointer;
        }

        .timeBar-bg {
            position: relative;
            display: flex;
            align-items: center;
            width: 177.78vh;
            height: 1.5vh;
            background-color: white;
        }


        .timeBar-fill {
            height: 1vh;
            width: 0%;
            background-color: red;
            
        }

        .white-top {
            position: absolute;
            top: 0%;
            left: 4%;
            font-size: 10vw;
            font-weight: bold;
            text-align: left;
            color: white;
        }

        .white-bottom {
            position: absolute;
            bottom: 2%;
            right: 4%;
            font-size: 10vw;
            font-weight: bold;
            text-align: right;
            color: white;
        }

        .blackbox {
            white-space: nowrap;
            position: absolute;
            writing-mode: vertical-rl;
            color: white;
            background-color: #2e2e2e;
            font-size: 3vw;
            padding: 4vw 1.5vw;
        }

        .blackbox-center {
            white-space: nowrap;
            position: absolute;
            writing-mode: vertical-rl;
            color: white;
            background-color: #2e2e2e;
            font-size: 3vw;
            padding: 4vw 1.5vw;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
        }        

        .center {
            white-space: nowrap;
            position: absolute;
            writing-mode: vertical-rl;
            color: #2e2e2e;
            background-color: white;
            font-size: 2vw;
            padding: 4vw 7vw;
            border-radius: 40%;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
        }
        .nobackground {
            white-space: nowrap;
            position: absolute;
            writing-mode: vertical-rl;
            color: white;
            font-size: 3vw;
            top: 10%;
            right: 5%;
            
        }

        .teto {
            position: absolute;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="mv-container">
        <!-- 여기에 가사 레이어들이 들어갈 예정 -->
         <div id="buttonOverlay">
            <div id="playButton">▶</div>
         </div>
         <img class="teto">
    </div>
    <audio id="bgm" src="MM.mp3"></audio>
    <div class="timeBar-bg">
        <div class="timeBar-fill"></div>
    </div>
    
    <script>
        const timeline = [
            { time: 0, text: "오늘은 마법에", type: "white-top", triggered: false },
            { time: 0, text: "걸린 메이드", type: "white-bottom", triggered: false },
            { time: 2.6, text: "밤에 반짝이는", type: "white-top", triggered: false },
            { time: 2.6, text: "별의 장막", type: "white-bottom", triggered: false },
            { time: 5.3, text: "특별한 말과", type: "white-top", triggered: false },
            { time: 5.3, text: "다과를", type: "white-bottom", triggered: false },
            { time: 8.1, text: "소박하지만", type: "white-top", triggered: false },
            { time: 8.1, text: "화려한 무대", type: "white-bottom", triggered: false },
            { time: 10.8, text: "과거와", type: "blackbox-center", triggered: false },
            { time: 11.3, text: "바이바이바이", type: "blackbox", triggered: false, top: "0%", left: "90%" },
            { time: 12.1, text: "지금을", type: "blackbox", triggered: false, top: "4%", left: "80%"},
            { time: 12.5, text: "사랑사랑사랑해", type: "blackbox", triggered: false, top: "35%", left: "73.5%"},
            { time: 14.1, text: "말할 수 있다면 아픔과", type: "blackbox", triggered: false, top: "5%", left: "63.5%" },
            { time: 15.4, text: "바이바이바이", type: "blackbox", triggered: false, top: "41%", left: "56.5%" },
            { time: 16.4, text: "오늘은 마법에 걸린 메이드", type: "center", triggered: false },
            { time: 18.9, text: "소박하지만 화려한 무대", type: "nobackground", triggered: false }
        ];
        
        const playButton = document.getElementById('playButton');
        const mvContainer = document.querySelector('.mv-container');
        const bgm = document.getElementById('bgm');
        
        
        let startTime;
        let currentFrame;
        let lastFrame = 0;





        playButton.addEventListener('click', function() {
            startTime = performance.now();
            document.getElementById('playButton').remove();
            document.getElementById('buttonOverlay').remove();
            bgm.play();
            getPlayTime();
        })

        function getPlayTime() {
            
            let nowTime = performance.now() - startTime;       

            // timeBar 계산
            let progress = (nowTime / 1000 / bgm.duration) * 100;
            document.querySelector('.timeBar-fill').style.width = progress+"%";
            
            // 재생 완료 후 정지
            if (nowTime / 1000 >= bgm.duration) {
                return;
            }

            // 이미지 생성부
            currentFrame = Math.floor(nowTime / 100) + 1;

            if (currentFrame !== lastFrame) {
                const teto = mvContainer.querySelector('.teto');
                const frameName = String(currentFrame).padStart(4, '0');
                const prevSrc = teto.src;  // 현재(이전) src 저장
                teto.onerror = function() { teto.src = prevSrc; };
                teto.src = `frames/frame_${frameName}.png`;
                lastFrame = currentFrame;
                if ((currentFrame >= 109 && currentFrame <= 113) || 
                    (currentFrame >= 165 && currentFrame <= 189)) {
                    teto.style.display = 'none';
                } else {
                    teto.style.display = 'block';
                }
            }



            // 자막 생성부
            for (let t = 0; t < timeline.length; t++) {
                if (!timeline[t].triggered){
                    if ((nowTime / 1000) > timeline[t].time) {

                        const el = document.createElement('p');
                        el.textContent = timeline[t].text;
                        el.classList.add(timeline[t].type);

                        if(timeline[t].type == "white-top") {
                            const old = mvContainer.querySelector('.white-top');
                            if (old) old.remove();

                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }

                        if(timeline[t].type == "white-bottom") {
                            const old = mvContainer.querySelector('.white-bottom');
                            if (old) old.remove();

                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }

                        if(timeline[t].type == "blackbox-center") {
                            const delWhite = mvContainer.querySelectorAll('.white-top, .white-bottom');
                            delWhite.forEach(el => el.remove());
                            
                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }

                        if(timeline[t].type == "blackbox") {
                            const old = mvContainer.querySelector('.blackbox-center');
                            if (old) old.remove();

                            el.style.top = timeline[t].top;
                            el.style.left = timeline[t].left;
                            
                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }

                        if(timeline[t].type == "center") {
                            const old = mvContainer.querySelectorAll('.blackbox');
                            old.forEach(el => el.remove());

                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }

                        if(timeline[t].type == "nobackground") {
                            const old = mvContainer.querySelector('.center');
                            if (old) old.remove();

                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }
                   
                    }
                }
            }


            requestAnimationFrame(getPlayTime);
        }

    </script>
</body>
</html>
