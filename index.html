<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <title>Magic Maid - Web MV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* MV 화면 컨테이너 - 16:9 비율 */
        .mv-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 9/16 = 0.5625 */
            max-height: 100vh;
            max-width: 177.78vh; /* 16/9 = 1.7778 */
            background: #D4A0A0;
            overflow: hidden;
            font-family: 'Noto Serif KR', serif;
        }

        .timeBar {
            position: relative;

        }

        .timeBar p {
            color: white;
        }

        .white-top {
            position: absolute;
            top: 0%;
            left: 4%;
            font-size: 10vw;
            font-weight: bold;
            text-align: left;
            color: white;
        }

        .white-bottom {
            position: absolute;
            bottom: 2%;
            right: 4%;
            font-size: 10vw;
            font-weight: bold;
            text-align: right;
            color: white;
        }

        .blackbox {
            position: absolute;
            writing-mode: vertical-rl;
            color: white;
            background-color: #2e2e2e;
            font-size: 3vw;
            padding: 2vw 1.5vw;
        }

        .nobackground {
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="mv-container">
        <!-- 여기에 가사 레이어들이 들어갈 예정 -->
    </div>
    <div class="timeBar">
        <p id="playTime"></p>
        <button id="playButton">재생</button>
    </div>
    
    <script>
        const timeline = [
            { time: 0, text: "오늘은 마법에", type: "white-top", triggered: false },
            { time: 0, text: "걸린 메이드", type: "white-bottom", triggered: false },
            { time: 3.5, text: "밤에 반짝이는", type: "white-top", triggered: false },
            { time: 3.5, text: "별의 장막", type: "white-bottom", triggered: false },
            { time: 6.2, text: "특별한 말과", type: "white-top", triggered: false },
            { time: 6.2, text: "다과를", type: "white-bottom", triggered: false },
            { time: 9, text: "소박하지만", type: "white-top", triggered: false },
            { time: 9, text: "화려한 무대", type: "white-bottom", triggered: false },
            { time: 11.6, text: "과거와", type: "blackbox", temp: true, triggered: false },
            { time: 12.2, text: "바이바이바이", type: "blackbox", triggered: false },
            { time: 13, text: "지금을", type: "blackbox", triggered: false },
            { time: 13.4, text: "사랑사랑사랑해", type: "blackbox", triggered: false },
            { time: 15, text: "말할 수 있다면 아픔과", type: "blackbox", triggered: false },
            { time: 16.3, text: "바이바이바이", type: "blackbox", triggered: false },
            { time: 17.3, text: "오늘은 마법에 걸린 메이드", type: "center", triggered: false },
            { time: 20, text: "소박하지만 화려한 무대", type: "nobackground", triggered: false }
        ];
        
        const playButton = document.getElementById('playButton');
        const mvContainer = document.querySelector('.mv-container');
        
        
        
        
        let startTime;







        playButton.addEventListener('click', function() {
            startTime = performance.now();
            getPlayTime();
        })

        function getPlayTime() {
            let nowTime = performance.now() - startTime;
            document.getElementById('playTime').textContent = (nowTime / 1000).toFixed(1);

            for (let t = 0; t < timeline.length; t++) {
                if (!timeline[t].triggered){
                    if ((nowTime / 1000) > timeline[t].time) {

                        const el = document.createElement('p');
                        el.textContent = timeline[t].text;
                        el.classList.add(timeline[t].type);

                        if(timeline[t].type == "white-top") {
                            const old = mvContainer.querySelector('.white-top');
                            if (old) old.remove();

                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }

                        if(timeline[t].type == "white-bottom") {
                            const old = mvContainer.querySelector('.white-bottom');
                            if (old) old.remove();

                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }

                        if(timeline[t].temp) {
                            el.dataset.temp = "true";
                        }     

                        if(timeline[t].type == "blackbox") {
                            const delWhite = mvContainer.querySelectorAll('.white-top, .white-bottom');
                            delWhite.forEach(el => el.remove());

                            const delTemp = mvContainer.querySelector('[data-temp="true"]');
                            if (delTemp) delTemp.remove();
                            mvContainer.appendChild(el);
                            timeline[t].triggered = true;
                        }


                   
                    }
                }
            }


            requestAnimationFrame(getPlayTime);
        }

    </script>
</body>
</html>
